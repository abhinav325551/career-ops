# Career-Ops Profile Configuration
# Customized for: Product Marketing roles — India · ASEAN · Middle East · Remote US/EMEA
#
# Copy this file to config/profile.yml and fill in your details.
# config/profile.yml is gitignored (contains personal data). This example is tracked.

candidate:
  full_name: "Your Name"
  email: "your@email.com"
  phone: "+91-XXXXXXXXXX"
  location: "Bengaluru, India"
  linkedin: "linkedin.com/in/yourprofile"
  portfolio_url: ""
  github: ""
  twitter: ""
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  primary:
    - "Senior Product Marketing Manager"
    - "Product Marketing Manager"
    - "Director of Product Marketing"
  secondary:
    - "Head of Product Marketing"
    - "Growth Marketing Manager"
    - "Developer Marketing Manager"
  archetypes:
    - name: "PMM — SaaS / B2B Tech"
      level: "Senior/Lead"
      fit: "primary"       # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "PMM — AI / Developer Tools"
      level: "Senior/Lead"
      fit: "primary"
    - name: "Growth Marketing Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Developer Marketing / DevRel Marketing"
      level: "Senior"
      fit: "adjacent"

narrative:
  headline: "Product Marketing leader bridging product depth with market storytelling"
  exit_story: "Built GTM motion for developer-first and B2B SaaS products with a focus on APAC and global markets."
  superpowers:
    - "Product positioning and competitive differentiation"
    - "Launch strategy and cross-functional GTM execution"
    - "APAC market understanding (India, SEA, Middle East)"
    - "Translating complex products into clear buyer narratives"
  proof_points:
    - name: "Product Launch"
      url: ""
      hero_metric: "Led launch that drove X% pipeline growth"
    - name: "Messaging / Repositioning"
      url: ""
      hero_metric: "Repositioned product narrative, Y% increase in trial signups"

compensation:
  # India
  target_range_india: "₹40L–70L"
  minimum_india: "₹35L"
  # Singapore
  target_range_sgd: "SGD 90K–140K"
  # UAE / Saudi Arabia
  target_range_aed: "AED 180K–280K"
  # Remote USD (US/EMEA)
  target_range_usd: "$80K–130K"
  currency_primary: "INR"
  location_flexibility: "India/ASEAN/ME on-site or hybrid preferred. Fully remote US/EMEA also open."

location:
  primary_markets:
    - country: "India"
      cities: ["Bengaluru", "Mumbai", "Delhi NCR", "Hyderabad", "Pune"]
      work_modes: ["onsite", "hybrid", "remote"]
    - country: "Singapore"
      work_modes: ["onsite", "hybrid", "remote"]
    - country: "UAE"
      cities: ["Dubai", "Abu Dhabi"]
      work_modes: ["onsite", "hybrid", "remote"]
    - country: "Saudi Arabia"
      cities: ["Riyadh", "Jeddah"]
      work_modes: ["onsite", "hybrid", "remote"]
  asean_markets:
    - "Malaysia (Kuala Lumpur)"
    - "Indonesia (Jakarta)"
    - "Thailand (Bangkok)"
    - "Philippines (Manila)"
    - "Vietnam (Ho Chi Minh City)"
  remote_markets:
    - region: "US"
      condition: "Fully remote only — no relocation"
    - region: "EMEA"
      condition: "Fully remote only — no relocation"
  timezone: "IST (UTC+5:30)"
  visa_status: "Indian citizen — no sponsorship needed for India roles. Check visa requirements for SEA/ME roles."
